services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ed_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -h localhost -p 5432 -U postgres -d ed_analytics
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    command: >
      sh -c "
        until pg_isready -h db -p 5432 -U postgres -d ed_analytics >/dev/null 2>&1; do
          echo 'waiting for db connections...';
          sleep 1;
        done;
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 10
